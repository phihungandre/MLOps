name: Validate code

on: [push]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          make install

      - name: Format code
        run: |
          make format

      - name: Lint with pyLint
        run: |
          make lint